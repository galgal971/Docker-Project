name: Deploy Web App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "~/Docker-Project" ]; then
              git clone https://github.com/galgal971/Docker-Project.git ~/Docker-Project
            fi
            cd ~/Docker-Project
            git pull origin main

            # Inject the secure GitHub Secret into an EC2 environment file
            echo "PRODUCTION_DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            
            # Use Compose to shut down the old version and launch the new one cleanly
            docker compose down
            docker compose up -d --build
